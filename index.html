<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>포켓몬 한글 도감</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap');
:root{
  --bg:#f5f0e8;
  --bg2:#ede8de;
  --panel:#faf7f2;
  --border:#d8d0c0;
  --border2:#c8c0b0;
  --card:#ffffff;
  --text:#2c2416;
  --text2:#5a5040;
  --gray:#9a9080;
  --shadow:rgba(80,60,20,0.10);
  --shadow2:rgba(80,60,20,0.06);
  --yellow:#c8860a;
  --yellow-light:#fdf3dc;
  --yellow-border:#e8b84b;
  --green:#3a7d44;
  --green-light:#eaf5ec;
  --red:#b83232;
  --blue:#2860a8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);font-family:'Nanum Gothic',sans-serif;min-height:100vh;color:var(--text)}
.screen{display:none;min-height:100vh}.screen.active{display:block}

/* ═══ MAIN ═══ */
.main-top{text-align:center;padding:36px 20px 20px;background:linear-gradient(180deg,var(--panel) 0%,var(--bg) 100%);border-bottom:1.5px solid var(--border)}
.main-top h1{font-family:'Jua',sans-serif;font-size:1.9rem;color:var(--yellow);letter-spacing:1px}
.main-top p{color:var(--gray);font-size:.82rem;margin-top:3px}
.score-chip{display:inline-block;margin-top:10px;background:var(--yellow-light);border:1.5px solid var(--yellow-border);border-radius:50px;padding:5px 16px;font-family:'Jua',sans-serif;font-size:.9rem;color:var(--yellow)}
.total-pbar{max-width:240px;height:6px;background:var(--border);border-radius:10px;overflow:hidden;margin:8px auto 3px}
.total-pbar-fill{height:100%;background:linear-gradient(90deg,var(--yellow),#e89a20);border-radius:10px;transition:width .6s}
.total-pct{font-size:.75rem;color:var(--gray);text-align:center}

.series-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 14px;max-width:560px;margin:0 auto}
.s-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:14px 8px 12px;cursor:pointer;transition:transform .18s,box-shadow .18s;text-align:center;box-shadow:0 2px 8px var(--shadow2)}
.s-card:hover{transform:translateY(-3px);box-shadow:0 6px 18px var(--shadow)}
.s-icon{font-size:1.9rem;display:block;margin-bottom:5px}
.s-name{font-family:'Jua',sans-serif;font-size:.82rem;margin-bottom:2px;color:var(--text)}
.s-sub{font-size:.62rem;color:var(--gray);margin-bottom:7px}
.s-bar-wrap{height:4px;background:var(--border);border-radius:10px;overflow:hidden;margin-bottom:3px}
.s-bar{height:100%;border-radius:10px;transition:width .5s}
.s-count{font-size:.6rem;color:var(--gray)}
.s-done-badge{font-size:.75rem;margin-top:4px;color:var(--yellow)}

.bottom-nav{display:flex;gap:9px;padding:4px 14px 32px;max-width:560px;margin:0 auto}
.b-btn{flex:1;background:var(--card);border:1.5px solid var(--border);color:var(--text2);font-family:'Jua',sans-serif;font-size:.82rem;padding:11px 4px;border-radius:12px;cursor:pointer;transition:all .15s;box-shadow:0 1px 4px var(--shadow2)}
.b-btn:hover{background:var(--bg2);border-color:var(--border2)}
.b-btn.gold{background:var(--yellow-light);border-color:var(--yellow-border);color:var(--yellow)}

/* ═══ TOP BAR ═══ */
.top-bar{display:flex;align-items:center;gap:10px;padding:14px 14px 10px;max-width:620px;margin:0 auto;border-bottom:1px solid var(--border);background:var(--panel)}
.back-btn{background:var(--bg2);border:1.5px solid var(--border);color:var(--text2);font-family:'Jua',sans-serif;font-size:.8rem;padding:6px 13px;border-radius:10px;cursor:pointer;flex-shrink:0}
.back-btn:hover{background:var(--border);color:var(--text)}
.top-bar h2{font-family:'Jua',sans-serif;font-size:1.1rem;color:var(--text)}

/* ═══ DEX ═══ */
#dexScreen{background:var(--bg);padding-bottom:40px}
.dex-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:12px 14px;max-width:580px;margin:0 auto}
.dex-item{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:8px 4px;text-align:center;box-shadow:0 1px 3px var(--shadow2)}
.dex-item.done{border-color:#3a7d44;background:#f0faf2}
.dex-img{width:52px;height:52px;object-fit:contain;display:block;margin:0 auto 3px}
.dex-img.shadow{filter:brightness(0) opacity(.15)}
.dex-name{font-size:.65rem;font-family:'Jua',sans-serif;color:var(--text)}
.dex-item.done .dex-name{color:var(--green)}
.dex-item:not(.done) .dex-name{color:var(--border2)}
.dex-num{font-size:.56rem;color:var(--gray);margin-bottom:1px}

/* ═══ LEARN ═══ */
#learnScreen{background:var(--bg);padding-bottom:40px}
.learn-hud{display:flex;align-items:center;gap:8px;background:var(--panel);border-bottom:1px solid var(--border);padding:9px 14px;max-width:100%;position:sticky;top:0;z-index:10}
.hud-inner{display:flex;align-items:center;gap:8px;max-width:600px;margin:0 auto;width:100%}
.hud-dots{display:flex;gap:4px;flex:1;flex-wrap:wrap}
.hud-dot{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;background:var(--bg);transition:all .3s;flex-shrink:0;color:var(--gray)}
.hud-dot.done{border-color:var(--green);background:var(--green-light);color:var(--green)}
.hud-dot.cur{border-color:var(--yellow);background:var(--yellow-light);color:var(--yellow);box-shadow:0 0 0 2px var(--yellow-border)}
.hud-score{font-family:'Jua',sans-serif;font-size:1rem;color:var(--yellow);white-space:nowrap}

.learn-card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;overflow:hidden;margin:14px 14px;max-width:580px;margin-left:auto;margin-right:auto;box-shadow:0 4px 16px var(--shadow);animation:cardIn .3s ease}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* 포켓몬 히어로 */
.poke-hero{display:flex;flex-direction:column;align-items:center;padding:24px 20px 18px;background:linear-gradient(160deg,var(--panel) 0%,var(--bg) 100%);border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.poke-hero::before{content:attr(data-bg);position:absolute;font-size:100px;opacity:.05;right:-6px;top:-6px;pointer-events:none}
.type-tag{font-size:.68rem;font-weight:800;padding:3px 14px;border-radius:20px;letter-spacing:1px;margin-bottom:10px;border:1.5px solid transparent}
.poke-img-ring{width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:12px;background:var(--bg2);border:3px solid var(--border)}
.poke-img{width:118px;height:118px;object-fit:contain;filter:drop-shadow(0 4px 10px var(--shadow));animation:float 3s ease-in-out infinite;position:relative;z-index:1}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.load-ico{width:118px;height:118px;display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.poke-name-big{font-family:'Jua',sans-serif;font-size:2.2rem;line-height:1;color:var(--text)}
.poke-num-sm{font-size:.68rem;color:var(--gray);letter-spacing:2px;margin-top:3px}
.cry-btn{margin-top:10px;background:var(--bg2);border:1.5px solid var(--border);border-radius:50px;padding:6px 16px;color:var(--text2);font-family:'Jua',sans-serif;font-size:.78rem;cursor:pointer;transition:all .2s}
.cry-btn:hover{background:var(--border);color:var(--text)}

/* 본문 */
.poke-body{padding:16px 18px}
.sec-lbl{font-size:.65rem;color:var(--gray);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;font-weight:800}
.desc-box{background:var(--bg);border-left:3px solid var(--border2);border-radius:8px;padding:10px 13px;font-size:.82rem;color:var(--text2);line-height:1.7;margin-bottom:14px}

/* 진화 체인 */
.evo-chain{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:12px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;margin-bottom:14px}
.evo-mon{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:52px}
.evo-img{width:48px;height:48px;object-fit:contain}
.evo-name{font-family:'Jua',sans-serif;font-size:.68rem;text-align:center;color:var(--text2)}
.evo-cur{color:var(--yellow)!important;font-weight:800}
.evo-lbl{font-size:.55rem;color:var(--gray);text-align:center}
.evo-arr{font-size:1rem;color:var(--border2);flex-shrink:0}

/* 글씨 쓰기 */
.writing-sec{padding:0 18px 18px}
.writing-title{font-family:'Jua',sans-serif;font-size:.9rem;margin-bottom:9px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;color:var(--text)}
.writing-title span{background:var(--yellow-light);color:var(--yellow);border:1px solid var(--yellow-border);font-size:.62rem;padding:2px 9px;border-radius:20px}
.guide-toggle{background:var(--bg2);border:1.5px solid var(--border2);color:var(--text2);font-size:.62rem;padding:2px 9px;border-radius:20px;cursor:pointer;font-family:'Jua',sans-serif}
.guide-toggle.on{background:#e8f4fd;border-color:#5b9fd4;color:#2860a8}

.writing-area{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.char-box{display:flex;flex-direction:column;align-items:center;gap:4px}
.guide-ch{font-family:'Jua',sans-serif;font-size:1.1rem;height:22px;display:flex;align-items:center;color:var(--border2)}
.cv-wrap{position:relative;border:2px solid var(--border2);border-radius:10px;overflow:hidden;background:#fff;cursor:crosshair;box-shadow:0 1px 4px var(--shadow2)}
.cv-wrap.active{border-color:var(--yellow);box-shadow:0 0 0 2px var(--yellow-border)}
.cv-wrap canvas{display:block;touch-action:none;position:relative;z-index:3}
.cv-wrap svg{position:absolute;inset:0;pointer-events:none}
.cv-guide-layer{position:absolute;inset:0;z-index:2;pointer-events:none;display:none}
.clr-ch{background:var(--bg2);border:1px solid var(--border);color:var(--gray);font-size:.62rem;padding:2px 6px;border-radius:7px;cursor:pointer;font-family:'Nanum Gothic',sans-serif}
.clr-ch:hover{color:var(--text)}

.tools{display:flex;gap:7px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.tl{font-size:.72rem;color:var(--gray)}
.pen-btns{display:flex;gap:4px}
.pb{width:26px;height:26px;border-radius:50%;background:var(--bg2);border:1.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pb.active{border-color:var(--yellow);background:var(--yellow-light)}
.dot{background:var(--text2);border-radius:50%}
.ds{width:4px;height:4px}.dm{width:8px;height:8px}.dl{width:12px;height:12px}
.all-clr{margin-left:auto;background:#fdf0f0;border:1.5px solid #e8c0c0;color:var(--red);font-size:.72rem;padding:4px 11px;border-radius:9px;cursor:pointer;font-family:'Nanum Gothic',sans-serif;font-weight:700}

.action-row{display:flex;gap:9px}
.btn-done{flex:1;background:linear-gradient(135deg,var(--yellow),#d4920e);color:#fff;font-family:'Jua',sans-serif;font-size:.95rem;border:none;padding:14px;border-radius:13px;cursor:pointer;box-shadow:0 3px 12px rgba(200,134,10,.3);transition:all .2s;letter-spacing:1px}
.btn-done:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(200,134,10,.4)}
.btn-done:active{transform:scale(.97)}

/* ═══ CARD ═══ */
#cardScreen{background:var(--bg);padding-bottom:40px}
.card-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:12px 14px;max-width:580px;margin:0 auto}
.poke-card{background:var(--card);border:1.5px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:0 2px 8px var(--shadow2)}
.card-top{padding:14px;text-align:center}
.card-poke-img{width:72px;height:72px;object-fit:contain;display:block;margin:0 auto}
.card-name{font-family:'Jua',sans-serif;font-size:1rem;margin:5px 0 1px;color:var(--text)}
.card-num{font-size:.6rem;color:var(--gray)}
.card-type-badge{font-size:.62rem;font-weight:800;padding:2px 10px;border-radius:20px;display:inline-block;margin-top:3px}
.card-divider{height:1px;background:var(--border)}
.card-writings{padding:10px 12px;display:flex;flex-wrap:wrap;gap:4px;justify-content:center;min-height:54px;align-items:center;background:var(--bg2)}
.card-cv img{display:block;width:44px;height:44px;object-fit:contain;border-radius:5px}
.card-empty{color:var(--gray);font-size:.72rem;font-family:'Jua',sans-serif}

/* ═══ SHEET ═══ */
#sheetScreen{background:var(--bg);padding-bottom:40px}
.sheet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;padding:12px 14px;max-width:620px;margin:0 auto}
.sh-card{background:var(--card);border:1.5px solid var(--border);border-radius:13px;padding:10px;text-align:center;box-shadow:0 1px 4px var(--shadow2)}
.sh-img{width:50px;height:50px;object-fit:contain;margin:0 auto 4px;display:block}
.sh-name{font-family:'Jua',sans-serif;font-size:.76rem;color:var(--yellow);margin-bottom:5px}
.sh-cvs{display:flex;gap:3px;justify-content:center;flex-wrap:wrap}
.sh-cv img{display:block;width:44px;height:44px;object-fit:contain;border-radius:5px;border:1px solid var(--border);background:#fff}

/* ═══ BADGE ═══ */
#badgeScreen{background:var(--bg);padding-bottom:40px}
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:12px 14px;max-width:560px;margin:0 auto}
.badge-item{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:16px 8px;text-align:center;box-shadow:0 1px 4px var(--shadow2)}
.badge-item.earned{border-color:var(--yellow-border);background:var(--yellow-light)}
.badge-icon{font-size:2.2rem;margin-bottom:6px;display:block;filter:grayscale(1) opacity(.3)}
.badge-item.earned .badge-icon{filter:none}
.badge-name{font-family:'Jua',sans-serif;font-size:.78rem;margin-bottom:2px;color:var(--text2)}
.badge-item:not(.earned) .badge-name{color:var(--border2)}
.badge-desc{font-size:.62rem;color:var(--gray);line-height:1.4}
.badge-earned-lbl{font-size:.6rem;color:var(--yellow);margin-top:4px;font-family:'Jua',sans-serif}

/* ═══ 기술 애니메이션 ═══ */
.skill-overlay{position:fixed;inset:0;z-index:500;pointer-events:none;display:flex;align-items:center;justify-content:center}
.skill-anim{text-align:center;transform:scale(0);transition:transform .28s cubic-bezier(.34,1.56,.64,1)}
.skill-anim.show{transform:scale(1)}
.skill-flash{position:fixed;inset:0;opacity:0;pointer-events:none;transition:opacity .15s;z-index:499}
.skill-flash.show{opacity:1}
.skill-emoji{font-size:4rem}
.skill-name{font-family:'Jua',sans-serif;font-size:1.5rem;color:var(--text);background:var(--panel);border:2px solid var(--border);border-radius:16px;padding:8px 20px;margin-top:8px;box-shadow:0 4px 16px var(--shadow)}
.skill-pts{font-family:'Jua',sans-serif;font-size:1rem;color:var(--yellow);margin-top:6px;background:var(--yellow-light);border:1.5px solid var(--yellow-border);border-radius:50px;padding:4px 16px;display:inline-block}

/* ═══ 팝업 ═══ */
.praise-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--panel);border:2px solid var(--yellow-border);border-radius:18px;padding:14px 24px;text-align:center;z-index:600;transition:transform .25s;box-shadow:0 6px 24px var(--shadow);pointer-events:none}
.praise-pop.show{transform:translate(-50%,-50%) scale(1)}
.pp-e{font-size:1.9rem}.pp-t{font-family:'Jua',sans-serif;font-size:1rem;color:var(--yellow);margin-top:4px}
.warn-pop{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--red);color:#fff;font-family:'Jua',sans-serif;font-size:.85rem;padding:9px 22px;border-radius:50px;z-index:700;transition:transform .25s;white-space:nowrap;box-shadow:0 4px 14px rgba(184,50,50,.3)}
.warn-pop.show{transform:translateX(-50%) translateY(0)}
.badge-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--panel);border:2px solid var(--yellow-border);border-radius:22px;padding:26px;text-align:center;z-index:800;transition:transform .35s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 32px var(--shadow);pointer-events:none;min-width:220px}
.badge-popup.show{transform:translate(-50%,-50%) scale(1)}
.bp-label{font-size:.68rem;color:var(--gray);letter-spacing:2px;margin-bottom:6px}
.bp-icon{font-size:3.5rem;margin-bottom:6px}
.bp-name{font-family:'Jua',sans-serif;font-size:1.2rem;color:var(--yellow)}
.bp-desc{font-size:.74rem;color:var(--gray);margin-top:3px}
.result-overlay{display:none;position:fixed;inset:0;background:rgba(44,36,22,.55);z-index:400;align-items:center;justify-content:center;padding:20px}
.result-overlay.show{display:flex}
.result-box{background:var(--panel);border:2px solid var(--yellow-border);border-radius:22px;padding:26px 20px;text-align:center;max-width:360px;width:100%;animation:pop .35s ease;box-shadow:0 8px 32px var(--shadow)}
@keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.rb-e{font-size:2.8rem;margin-bottom:7px}.rb-tt{font-family:'Jua',sans-serif;font-size:1.4rem;color:var(--yellow);margin-bottom:2px}
.rb-s{color:var(--gray);font-size:.8rem;margin-bottom:10px}.rb-sc{font-family:'Jua',sans-serif;font-size:2.2rem;color:var(--green);margin-bottom:14px}
.rb-badge{background:var(--yellow-light);border:1.5px solid var(--yellow-border);border-radius:12px;padding:10px;margin-bottom:14px;display:none}
.rb-badge.show{display:block}
.rb-badge-ico{font-size:2rem}.rb-badge-txt{font-family:'Jua',sans-serif;font-size:.82rem;color:var(--yellow);margin-top:3px}
.rb-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:14px}
.rb-item{background:var(--bg2);border-radius:8px;padding:4px 2px;font-size:.58rem;color:var(--gray);text-align:center;border:1px solid var(--border)}
.rb-item img{width:34px;height:34px;object-fit:contain;display:block;margin:0 auto 1px}
.rb-btns{display:flex;gap:7px}
.rb-btn{flex:1;font-family:'Jua',sans-serif;font-size:.85rem;border:none;padding:11px;border-radius:11px;cursor:pointer;transition:all .18s}
.rb-btn.p{background:linear-gradient(135deg,var(--yellow),#d4920e);color:#fff;box-shadow:0 3px 10px rgba(200,134,10,.3)}
.rb-btn.s{background:var(--bg2);border:1.5px solid var(--border);color:var(--text2)}
.rb-btn:hover{transform:translateY(-2px)}

/* 빈칸 강조 */
.cv-wrap.empty-warn{border-color:var(--red)!important;box-shadow:0 0 0 2px #e8c0c0!important}
</style>
</head>
<body>

<div id="mainScreen" class="screen active">
  <div class="main-top">
    <h1>🎮 포켓몬 한글 도감</h1>
    <p>1세대 151마리 — 이름을 읽고 써봐요!</p>
    <div class="score-chip">⭐ <span id="totalScoreDisp">0</span>점</div>
    <div class="total-pbar"><div class="total-pbar-fill" id="totalPbar" style="width:0%"></div></div>
    <div class="total-pct" id="totalPct">전체 0 / 151마리 수집</div>
  </div>
  <div class="series-wrap" id="seriesGrid"></div>
  <div class="bottom-nav">
    <button class="b-btn gold" onclick="showDex()">📖 도감</button>
    <button class="b-btn" onclick="showScreen('cardScreen');buildCards()">📇 카드</button>
    <button class="b-btn" onclick="showScreen('sheetScreen');buildSheet()">✏️ 글씨</button>
    <button class="b-btn" onclick="showScreen('badgeScreen');buildBadges()">🏆 뱃지</button>
  </div>
</div>

<div id="dexScreen" class="screen">
  <div class="top-bar"><button class="back-btn" onclick="showMain()">← 뒤로</button><h2 id="dexTitle">📖 전체 도감</h2></div>
  <div class="dex-grid" id="dexGrid"></div>
</div>

<div id="learnScreen" class="screen">
  <div class="learn-hud">
    <div class="hud-inner">
      <button class="back-btn" onclick="showMain()" style="padding:5px 10px;font-size:.75rem">← 뒤로</button>
      <div class="hud-dots" id="hudDots"></div>
      <div class="hud-score">⭐<span id="scoreDisp">0</span></div>
    </div>
  </div>
  <div class="learn-card" id="learnCard">
    <div class="poke-hero" id="pokeHero" data-bg="⚡">
      <div class="type-tag" id="typeTag">⚡ 전기</div>
      <div class="poke-img-ring" id="imgRing">

let store = JSON.parse(localStorage.getItem('pkH5')||'{}');
let totalScore = parseInt(localStorage.getItem('pkS5')||'0');
let curSeries=null, curIdx=0, canvases=[], penSize=8, guideOn=false, curPokeId=25;

function save(){localStorage.setItem('pkH5',JSON.stringify(store));localStorage.setItem('pkS5',String(totalScore));}
function k(sid,i){return `${sid}_${i}`;}
function isDone(sid,i){return !!store[k(sid,i)]?.done;}
function progress(sid){return SERIES.find(s=>s.id===sid).pokemon.filter((_,i)=>isDone(sid,i)).length;}
function totalDone(){return SERIES.reduce((a,s)=>a+progress(s.id),0);}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function showMain(){buildMain();showScreen('mainScreen');}
function showDex(sid){buildDex(sid);showScreen('dexScreen');}
function goToDex(){document.getElementById('resultOverlay').classList.remove('show');showDex(curSeries.id);}

function buildMain(){
  document.getElementById('totalScoreDisp').textContent=totalScore;
  const done=totalDone();
  document.getElementById('totalPbar').style.width=`${(done/ALL_TOTAL)*100}%`;
  document.getElementById('totalPct').textContent=`전체 ${done} / ${ALL_TOTAL}마리 수집`;
  const grid=document.getElementById('seriesGrid'); grid.innerHTML='';
  SERIES.forEach(s=>{
    const d=progress(s.id),t=s.pokemon.length,pct=(d/t)*100,earned=d===t;
    const c=document.createElement('div'); c.className='s-card';
    if(earned) c.style.borderColor=s.color+'88';
    c.innerHTML=`<span class="s-icon">${s.icon}</span>
      <div class="s-name">${s.name.replace(' 타입','')}</div>
      <div class="s-sub">${t}마리</div>
      <div class="s-bar-wrap"><div class="s-bar" style="width:${pct}%;background:${s.color}"></div></div>
      <div class="s-count">${d}/${t}</div>
      <div class="s-done-badge">${earned?'🏆 완성!':''}</div>`;
    c.onclick=()=>showLearn(s.id);
    grid.appendChild(c);
  });
}

function buildDex(sid){
  document.getElementById('dexTitle').textContent=sid?`${SERIES.find(s=>s.id===sid).icon} 도감`:'📖 전체 도감';
  const grid=document.getElementById('dexGrid'); grid.innerHTML='';
  SERIES.forEach(s=>{
    if(sid&&s.id!==sid)return;
    s.pokemon.forEach((p,i)=>{
      const done=isDone(s.id,i);
      const el=document.createElement('div'); el.className=`dex-item${done?' done':''}`;
      el.innerHTML=`<div class="dex-num">#${String(p.id).padStart(3,'0')}</div>
        <img class="dex-img${done?'':' shadow'}" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png" alt="">
        <div class="dex-name">${done?p.name:'???'}</div>`;
      grid.appendChild(el);
    });
  });
}

function buildCards(){
  const grid=document.getElementById('cardGrid'); grid.innerHTML='';
  let any=false;
  SERIES.forEach(s=>{
    s.pokemon.forEach((p,i)=>{
      const entry=store[k(s.id,i)];
      if(!entry?.done)return;
      any=true;
      const card=document.createElement('div'); card.className='poke-card';
      card.style.borderTopColor=s.color;
      const cvH=(entry.urls||[]).map(u=>`<div class="card-cv"><img src="${u}"></div>`).join('');
      card.innerHTML=`<div class="card-top" style="background:linear-gradient(160deg,${s.bgColor},#fff)">
        <img class="card-poke-img" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png" alt="">
        <div class="card-name">${p.name}</div>
        <div class="card-num">#${String(p.id).padStart(3,'0')}</div>
        <div class="card-type-badge" style="background:${s.bgColor};color:${s.color};border:1px solid ${s.color}44">${s.icon} ${s.name.replace(' 타입','')}</div>
      </div>
      <div class="card-divider"></div>
      <div class="card-writings">${cvH||'<div class="card-empty">글씨를 써봐요!</div>'}</div>`;
      grid.appendChild(card);
    });
  });
  if(!any) grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--gray)"><div style="font-size:3rem;margin-bottom:10px">📇</div><div style="font-family:Jua,sans-serif;font-size:1rem">아직 카드가 없어요!<br>포켓몬 이름을 쓰면 카드가 만들어져요 😊</div></div>';
}

function buildSheet(){
  const grid=document.getElementById('sheetGrid'); grid.innerHTML='';
  let any=false;
  SERIES.forEach(s=>{
    s.pokemon.forEach((p,i)=>{
      const entry=store[k(s.id,i)];
      if(!entry?.done)return;
      any=true;
      const card=document.createElement('div'); card.className='sh-card';
      const cvH=(entry.urls||[]).map(u=>`<div class="sh-cv"><img src="${u}"></div>`).join('');
      card.innerHTML=`<img class="sh-img" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png" alt="">
        <div class="sh-name">${p.name}</div><div class="sh-cvs">${cvH}</div>`;
      grid.appendChild(card);
    });
  });
  if(!any) grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--gray)"><div style="font-size:3rem;margin-bottom:10px">✏️</div><div style="font-family:Jua,sans-serif;font-size:1rem">아직 쓴 글씨가 없어요 😊</div></div>';
}

function buildBadges(){
  const grid=document.getElementById('badgeGrid'); grid.innerHTML='';
  BADGES.forEach(b=>{
    const earned=checkBadge(b.id);
    const el=document.createElement('div'); el.className=`badge-item${earned?' earned':''}`;
    el.innerHTML=`<span class="badge-icon">${b.icon}</span>
      <div class="badge-name">${b.name}</div>
      <div class="badge-desc">${b.desc}</div>
      ${earned?'<div class="badge-earned-lbl">✅ 획득!</div>':''}`;
    grid.appendChild(el);
  });
}

function checkBadge(id){
  const s=SERIES.find(s=>s.id===id);
  if(s)return progress(id)===s.pokemon.length;
  if(id==='first')return totalDone()>=1;
  if(id==='half')return totalDone()>=Math.floor(ALL_TOTAL/2);
  if(id==='all')return totalDone()>=ALL_TOTAL;
  return false;
}

function checkNewBadges(prev,sid){
  const res=[];
  if(prev===0&&totalDone()>=1)res.push(BADGES.find(b=>b.id==='first'));
  const s=SERIES.find(s=>s.id===sid);
  if(s&&progress(sid)===s.pokemon.length)res.push(BADGES.find(b=>b.id===sid));
  const half=Math.floor(ALL_TOTAL/2);
  if(prev<half&&totalDone()>=half)res.push(BADGES.find(b=>b.id==='half'));
  if(prev<ALL_TOTAL&&totalDone()>=ALL_TOTAL)res.push(BADGES.find(b=>b.id==='all'));
  return res.filter(Boolean);
}

function showBadgePopup(badge,cb){
  const el=document.getElementById('badgePopup');
  document.getElementById('bpIcon').textContent=badge.icon;
  document.getElementById('bpName').textContent=badge.name;
  document.getElementById('bpDesc').textContent=badge.desc;
  el.classList.add('show');
  setTimeout(()=>{el.classList.remove('show');if(cb)setTimeout(cb,300);},2200);
}

function showLearn(sid){
  curSeries=SERIES.find(s=>s.id===sid); curIdx=0;
  document.getElementById('scoreDisp').textContent=totalScore;
  loadPoke(0); showScreen('learnScreen');
}

function loadPoke(idx){
  curIdx=idx;
  const s=curSeries, p=s.pokemon[idx];
  curPokeId=p.id;
  const tag=document.getElementById('typeTag');
  tag.textContent=`${s.icon} ${s.name.replace(' 타입','')}`;
  tag.style.cssText=`background:${s.bgColor};color:${s.color};border:1.5px solid ${s.color}44;font-size:.68rem;font-weight:800;padding:3px 14px;border-radius:20px;letter-spacing:1px;margin-bottom:10px`;
  document.getElementById('pokeHero').setAttribute('data-bg',s.icon);
  document.getElementById('pokeHero').style.background=`linear-gradient(160deg,${s.bgColor} 0%,var(--bg) 100%)`;
  document.getElementById('pokeName').textContent=p.name;
  document.getElementById('pokeName').style.color=s.color;
  document.getElementById('pokeNum').textContent=`#${String(p.id).padStart(3,'0')}`;
  document.getElementById('pokeDesc').textContent=p.desc;
  document.getElementById('imgRing').style.borderColor=s.color+'55';
  const lo=document.getElementById('loadIco'),im=document.getElementById('pokeImg');
  lo.textContent=s.icon; lo.style.display='flex'; im.style.display='none';
  im.src=`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png`;
  im.onload=()=>{lo.style.display='none';im.style.display='block';};
  buildEvo(p.evo,s.color);
  buildHUD();
  buildWriting(p.name,s.color,s.bgColor);
  guideOn=false;
  document.getElementById('guideToggle').textContent='점선 OFF';
  document.getElementById('guideToggle').classList.remove('on');
  const card=document.getElementById('learnCard');
  card.style.animation='none'; void card.offsetWidth; card.style.animation='cardIn .3s ease';
}

function buildEvo(evo,color){
  const el=document.getElementById('evoChain'); el.innerHTML='';
  if(!evo||evo.length<=1){el.innerHTML='<span style="color:var(--gray);font-size:.76rem">진화하지 않아요 ✨</span>';return;}
  evo.forEach((e,i)=>{
    if(i>0){const a=document.createElement('div');a.className='evo-arr';a.textContent='→';el.appendChild(a);}
    const m=document.createElement('div'); m.className='evo-mon';
    const img=document.createElement('img'); img.className='evo-img';
    img.src=`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${e.id}.png`; img.alt=e.name;
    const nm=document.createElement('div'); nm.className=`evo-name${e.cur?' evo-cur':''}`;
    if(e.cur){nm.style.color=color;nm.style.fontWeight='800';}
    nm.textContent=e.name;
    const lb=document.createElement('div'); lb.className='evo-lbl'; lb.textContent=e.cur?'◀ 지금':'';
    m.appendChild(img); m.appendChild(nm); m.appendChild(lb); el.appendChild(m);
  });
}

function buildHUD(){
  const el=document.getElementById('hudDots'); el.innerHTML='';
  curSeries.pokemon.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className=`hud-dot${i===curIdx?' cur':isDone(curSeries.id,i)?' done':''}`;
    d.textContent=isDone(curSeries.id,i)?'✓':'';
    el.appendChild(d);
  });
}

function buildWriting(name,color,bgColor){
  const area=document.getElementById('writingArea'); area.innerHTML=''; canvases=[];
  const chars=name.split('');
  const avail=Math.min(window.innerWidth,580)-80;
  const SIZE=Math.min(84,Math.floor(avail/chars.length)-11);
  chars.forEach(ch=>{
    const box=document.createElement('div'); box.className='char-box';
    const g=document.createElement('div'); g.className='guide-ch'; g.textContent=ch; g.style.color=color;
    const wrap=document.createElement('div'); wrap.className='cv-wrap';
    wrap.style.width=SIZE+'px'; wrap.style.height=SIZE+'px';
    const ns='http://www.w3.org/2000/svg';
    const svg=document.createElementNS(ns,'svg');
    svg.setAttribute('width',SIZE); svg.setAttribute('height',SIZE);
    svg.style.cssText='position:absolute;inset:0;z-index:1;pointer-events:none';
    const step=SIZE/4;
    for(let j=1;j<4;j++){
      [[0,j*step,SIZE,j*step],[j*step,0,j*step,SIZE]].forEach(([x1,y1,x2,y2])=>{
        const l=document.createElementNS(ns,'line');
        l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
        l.setAttribute('stroke','rgba(100,80,40,0.15)');l.setAttribute('stroke-width','0.7');svg.appendChild(l);
      });
    }
    [[0,0,SIZE,SIZE],[SIZE,0,0,SIZE]].forEach(([x1,y1,x2,y2])=>{
      const l=document.createElementNS(ns,'line');
      l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
      l.setAttribute('stroke','rgba(180,80,80,0.12)');l.setAttribute('stroke-width','0.7');svg.appendChild(l);
    });
    const gl=document.createElement('div'); gl.className='cv-guide-layer';
    gl.innerHTML=`<svg width="${SIZE}" height="${SIZE}" style="position:absolute;inset:0;pointer-events:none;z-index:2">
      <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle"
        font-family="Jua,sans-serif" font-size="${SIZE*0.65}"
        fill="rgba(80,60,20,0.1)" stroke="rgba(80,60,20,0.08)" stroke-width="1"
        stroke-dasharray="4,3">${ch}</text></svg>`;
    const cv=document.createElement('canvas'); cv.width=SIZE; cv.height=SIZE;
    cv.style.cssText='display:block;touch-action:none;position:relative;z-index:3';
    setupCv(cv,wrap);
    canvases.push({cv,gl});
    const clr=document.createElement('button'); clr.className='clr-ch'; clr.textContent='지우기';
    clr.onclick=()=>cv.getContext('2d').clearRect(0,0,cv.width,cv.height);
    wrap.appendChild(svg); wrap.appendChild(gl); wrap.appendChild(cv);
    box.appendChild(g); box.appendChild(wrap); box.appendChild(clr);
    area.appendChild(box);
  });
}

function toggleGuide(){
  guideOn=!guideOn;
  const btn=document.getElementById('guideToggle');
  btn.textContent=`점선 ${guideOn?'ON':'OFF'}`;
  btn.classList.toggle('on',guideOn);
  canvases.forEach(({gl})=>{gl.style.display=guideOn?'block':'none';});
}

function setupCv(cv,wrap){
  const ctx=cv.getContext('2d');
  let drawing=false,lx,ly;
  function pos(e){
    const r=cv.getBoundingClientRect(),sx=cv.width/r.width,sy=cv.height/r.height;
    const src=e.touches?e.touches[0]:e;
    return[(src.clientX-r.left)*sx,(src.clientY-r.top)*sy];
  }
  function start(e){e.preventDefault();drawing=true;wrap.classList.add('active');[lx,ly]=pos(e);ctx.beginPath();ctx.arc(lx,ly,penSize/2,0,Math.PI*2);ctx.fillStyle='#1a0a00';ctx.fill();}
  function move(e){e.preventDefault();if(!drawing)return;const[x,y]=pos(e);ctx.strokeStyle='#1a0a00';ctx.lineWidth=penSize;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.stroke();[lx,ly]=[x,y];}
  function end(e){e.preventDefault();drawing=false;wrap.classList.remove('active');}
  cv.addEventListener('mousedown',start);cv.addEventListener('mousemove',move);cv.addEventListener('mouseup',end);cv.addEventListener('mouseleave',end);
  cv.addEventListener('touchstart',start,{passive:false});cv.addEventListener('touchmove',move,{passive:false});cv.addEventListener('touchend',end,{passive:false});
}

function setPen(size,btn){penSize=size;document.querySelectorAll('.pb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function clearAll(){canvases.forEach(({cv})=>cv.getContext('2d').clearRect(0,0,cv.width,cv.height));}
function hasDrawing(cv){
  const d=cv.getContext('2d').getImageData(0,0,cv.width,cv.height).data;
  for(let i=3;i<d.length;i+=4)if(d[i]>10)return true;
  return false;
}

function playCry(){
  try{
    const a=new Audio(`https://raw.githubusercontent.com/PokeAPI/cries/main/cries/pokemon/latest/${curPokeId}.ogg`);
    a.volume=0.6;a.play().catch(()=>{});
  }catch(e){}
}

function markDone(){
  const empty=canvases.filter(({cv})=>!hasDrawing(cv));
  if(empty.length>0){
    showWarn(`✏️ ${empty.length}칸을 아직 안 썼어요!`);
    canvases.forEach(({cv})=>{
      if(!hasDrawing(cv)){
        cv.parentElement.classList.add('empty-warn');
        setTimeout(()=>cv.parentElement.classList.remove('empty-warn'),1600);
      }
    });
    return;
  }
  const prev=totalDone();
  store[k(curSeries.id,curIdx)]={done:true,urls:canvases.map(({cv})=>cv.toDataURL('image/png'))};
  totalScore+=10;
  document.getElementById('scoreDisp').textContent=totalScore;
  save();
  showSkillAnim(curSeries);
  const newBadges=checkNewBadges(prev,curSeries.id);
  const proceed=()=>{
    if(curIdx+1>=curSeries.pokemon.length)showResult();
    else loadPoke(curIdx+1);
  };
  if(newBadges.length>0){
    setTimeout(()=>{
      let i=0;
      function next(){if(i>=newBadges.length){proceed();return;}showBadgePopup(newBadges[i++],next);}
      next();
    },1400);
  } else {
    setTimeout(proceed,1400);
  }
}

function showSkillAnim(s){
  const ov=document.getElementById('skillOverlay'),an=document.getElementById('skillAnim'),fl=document.getElementById('skillFlash');
  document.getElementById('skillEmoji').textContent=s.skillFx;
  document.getElementById('skillName').textContent=s.skill;
  document.getElementById('skillPts').textContent='+10점!';
  fl.style.background=s.bgColor;
  fl.classList.add('show'); an.classList.add('show');
  setTimeout(()=>{fl.classList.remove('show');an.classList.remove('show');},1300);
}

function showResult(){
  const s=curSeries;
  document.getElementById('rbTt').textContent=`${s.icon} ${s.name} 완성!`;
  document.getElementById('rbS').textContent=`${s.pokemon.length}마리를 모두 배웠어요!`;
  document.getElementById('rbSc').textContent=`+${s.pokemon.length*10}점`;
  const earned=progress(s.id)===s.pokemon.length;
  document.getElementById('rbBadge').classList.toggle('show',earned);
  if(earned){document.getElementById('rbBadgeIco').textContent=s.icon;document.getElementById('rbBadgeTxt').textContent=`${s.name} 마스터 뱃지 획득!`;}
  const g=document.getElementById('rbGrid'); g.innerHTML='';
  s.pokemon.forEach(p=>{
    const d=document.createElement('div');d.className='rb-item';
    d.innerHTML=`<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png" alt=""><div>${p.name}</div>`;
    g.appendChild(d);
  });
  document.getElementById('resultOverlay').classList.add('show');
}

let wT;
function showWarn(msg){const el=document.getElementById('warn');el.textContent=msg;el.classList.add('show');clearTimeout(wT);wT=setTimeout(()=>el.classList.remove('show'),2000);}

buildMain();
</script>
